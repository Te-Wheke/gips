name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Prepare fixture GeoIP backend
        run: |
          mkdir -p "$RUNNER_TEMP/gips-tools"
          cp scripts/mock-mmdblookup.sh "$RUNNER_TEMP/gips-tools/mmdblookup"
          chmod +x "$RUNNER_TEMP/gips-tools/mmdblookup"
          echo "$RUNNER_TEMP/gips-tools" >> "$GITHUB_PATH"
          echo "GIP_DB_PATH=$GITHUB_WORKSPACE/tests/fixtures/GeoLite2-City.mmdb" >> "$GITHUB_ENV"
          echo "GIPS_TEST_MODE=1" >> "$GITHUB_ENV"
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install .
      - name: Run finalize gate
        run: ./scripts/finalize-check.sh
